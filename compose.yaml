services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: "no"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./.runtime:/app/.runtime
    user: bun
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
